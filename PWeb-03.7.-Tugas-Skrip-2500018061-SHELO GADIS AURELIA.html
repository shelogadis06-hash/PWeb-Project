<!DOCTYPE html>
<html>
<head>
    <title>Contoh Superscript dan Subscript</title>
</head>
<body>

    <h2>Contoh Penggunaan Superscript dan Subscript</h2>

    <p>
        Indeks bawah:
        x<sub>1</sub> + x<sub>2</sub>
    </p>

    <p>
        Pangkat atas:
        (x<sub>1</sub> + x<sub>2</sub>)<sup>2</sup>
    </p>

    <p>
        Reaksi kimia:
        2H<sub>2</sub> + O<sub>2</sub> = 2H<sub>2</sub>O
    </p>

</body>
</html>
